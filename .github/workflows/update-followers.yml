name: Auto-update Threads + Instagram followers

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00 = 台灣時間 10:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch followers & refresh tokens
        id: fetch
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: |
          set +e
          python3 scripts/update_followers.py > /tmp/stdout.log 2>/tmp/stderr.log
          EXIT_CODE=$?
          echo "=== stderr ===" && cat /tmp/stderr.log
          echo "=== stdout ===" && cat /tmp/stdout.log
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Script failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          NEW_TOKEN=$(grep '^NEW_TOKEN=' /tmp/stdout.log | cut -d= -f2-)
          NEW_IG_TOKEN=$(grep '^NEW_IG_TOKEN=' /tmp/stdout.log | cut -d= -f2-)
          echo "new_token=$NEW_TOKEN" >> "$GITHUB_OUTPUT"
          echo "new_ig_token=$NEW_IG_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Refresh THREADS_ACCESS_TOKEN secret
        if: steps.fetch.outputs.new_token != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_TOKEN: ${{ steps.fetch.outputs.new_token }}
          REPO: ${{ github.repository }}
        run: gh secret set THREADS_ACCESS_TOKEN --body "$NEW_TOKEN" --repo "$REPO"
        continue-on-error: true

      - name: Refresh INSTAGRAM_ACCESS_TOKEN secret
        if: steps.fetch.outputs.new_ig_token != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_IG_TOKEN: ${{ steps.fetch.outputs.new_ig_token }}
          REPO: ${{ github.repository }}
        run: gh secret set INSTAGRAM_ACCESS_TOKEN --body "$NEW_IG_TOKEN" --repo "$REPO"
        continue-on-error: true

      - name: Commit & push if count changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bio/index.html
          git diff --staged --quiet && echo "Nothing to commit" || \
            (git commit -m "chore: auto-update followers [skip ci]" && git push)
